name: Semantic Release
run-name: Release - ${{ github.ref_name }}
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'units/**'
      - 'stacks/**'

permissions:
  contents: read # for actions/checkout

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changes.outputs.files }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        run: |
          # Get changed directories
          CHANGED_PATHS=$(git diff --name-only $(git describe --tags --abbrev=0) HEAD -- stacks units)

          # Extract unique top-level directories (e.g., stacks/foo/bar or units/foo/bar)
          DIRS=$(echo "$CHANGED_PATHS" | xargs -I {} dirname "{}" | sort -u)

          files=""
          for dir in $DIRS; do
            files+="\"$dir\","
          done

          if [[ -n "$files" ]]; then
            files="[${files::${#files}-1}]"
            echo "Changed directories: $files"
            echo "files=$files" >> $GITHUB_OUTPUT
          else
            echo "No directories changed"
            echo "files=[]" > $GITHUB_OUTPUT
          fi
  release:
    name: release
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ fromJSON(needs.detect-changes.outputs.files)[0] }}
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.detect-changes.outputs.files) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure tag_format
        run: echo "TAG_FORMAT=$(echo '${{ matrix.dir }}' | tr '/' '_')-v\${version}" >> $GITHUB_ENV

      - name: Semantic Release
        run: npx semantic-release --tag-format '${{ env.TAG_FORMAT }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}